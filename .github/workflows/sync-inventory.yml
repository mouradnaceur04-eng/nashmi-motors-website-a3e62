name: Sync Inventory from DealerCenter

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes (GitHub's minimum interval)
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to push the updated inventory.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests playwright
          python -m playwright install chromium --with-deps

      - name: Run inventory scraper
        run: python scraper/scrape.py

      - name: Commit and push if inventory changed
        run: |
          git config user.name  "Nashmi Inventory Bot"
          git config user.email "bot@nashmimotors.com"
          git add public/inventory.json
          if git diff --staged --quiet; then
            echo "No inventory changes — nothing to commit."
          else
            git commit -m "sync: auto-update inventory from DealerCenter [skip ci]"
            git push
            echo "Pushed — Netlify will deploy the update now."
          fi
